services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mensah_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mensah_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-mensah_rentals_dev}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-mensah_dev} -d ${POSTGRES_DB:-mensah_rentals_dev}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
